      description: |-
        Privacy-preserving recent-turn metadata for exploration state reads.

        ``question_hash`` lets clients de-duplicate or reconcile local UI state
        after a reload without receiving the player's raw question text.  It is a
        canonical SHA-256 hash of the normalized question.
        The answer is omitted for the same reason; exact answer replay remains on
        the idempotent POST response, not the default state read model.
      example:
        exploration_turn_id: exploration_turn_id
        redirect_reason: redirect_reason
        cache_hit: true
        requires_action: true
        question_hash: question_hash
        created_at: ""
        cache_source: cache_source
      properties:
        exploration_turn_id:
          title: Exploration Turn Id
          type: string
        question_hash:
          title: Question Hash
          type: string
        cache_source:
          title: Cache Source
          type: string
        cache_hit:
          title: Cache Hit
          type: boolean
        requires_action:
          title: Requires Action
          type: boolean
        redirect_reason:
          nullable: true
          type: string
        created_at:
          default: ""
          title: Created At
          type: string
      required:
      - cache_hit
      - cache_source
      - exploration_turn_id
      - question_hash
      - requires_action
      title: ExplorationRecentTurnResponse
    ExplorationRequest:
      description: |-
        Request body for POST /story/{story_id}/explore.

        Exploration is a non-advancing read-plus-enrichment path. The endpoint
        still requires an idempotency key because successful answers can persist a
        player-owned turn, an overlay merge, and cache metadata.

        ``node_id`` is expected to be the session's current node. This keeps the
        route from becoming a general story-inspection API and matches the privacy
        boundary used by the state read endpoint. ``lock_token`` is accepted only
        as the existing client/device ownership token; the route still acquires the
        Redis session-context lock before calling the exploration service.
      example:
        question: question
        idempotency_key: idempotency_key
        node_id: node_id
        lock_token: lock_token
      properties:
        node_id:
          minLength: 1
          title: Node Id
          type: string
        question:
          maxLength: 500
          minLength: 1
          title: Question
          type: string
        idempotency_key:
          minLength: 1
          title: Idempotency Key
          type: string
        lock_token:
          nullable: true
          type: string
      required:
      - idempotency_key
      - node_id
      - question
      title: ExplorationRequest
    ExplorationStateResponse:
      description: |-
        Default player-facing read model for current-node exploration state.

        Raw ``question`` and ``answer`` turn text are intentionally absent here.
        Clients get the shared node enrichment summary/details plus HMACed
        recent-turn metadata; raw transcript readback belongs behind the later
        privacy/export gates rather than this reload-friendly endpoint.
      example:
        enrichment_details:
          key: ""
        question_count: 0
        playthrough_id: playthrough_id
        recent_turns:
        - exploration_turn_id: exploration_turn_id
          redirect_reason: redirect_reason
          cache_hit: true
          requires_action: true
          question_hash: question_hash
          created_at: ""
          cache_source: cache_source
        - exploration_turn_id: exploration_turn_id
          redirect_reason: redirect_reason
          cache_hit: true
          requires_action: true
          question_hash: question_hash
          created_at: ""
          cache_source: cache_source
        current_node_id: current_node_id
        node_id: node_id
      properties:
        node_id:
          title: Node Id
          type: string
        current_node_id:
          title: Current Node Id
          type: string
        playthrough_id:
          title: Playthrough Id
          type: string
        enrichment_details:
          additionalProperties: true
          default: {}
          title: Enrichment Details
          type: object
        question_count:
          default: 0
          title: Question Count
          type: integer
        recent_turns:
          default: []
          items:
            $ref: "#/components/schemas/ExplorationRecentTurnResponse"
          title: Recent Turns
          type: array
      required:
      - current_node_id
      - node_id
      - playthrough_id
      title: ExplorationStateResponse
    FreeTextRequest:
