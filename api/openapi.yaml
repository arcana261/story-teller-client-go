    NodeResponse:
      description: |-
        Full representation of a story node returned by GET /node and SSE done events.

        ``end_reason`` is non-null only on END nodes: ``"depth_cap"`` means the
        story ended because the player hit ``max_nodes``; ``"llm_decided"`` means
        the LLM chose to end the narrative naturally.

        ``resolved_anchor`` is non-null only on END nodes that clearly matched one
        of the story's declared ``outcome_anchors``; it contains the verbatim anchor
        text that was reached.

        ``character_delta`` lists character IDs introduced at this node so the
        client can display character-introduction UI inline. Generated character
        specs are stored server-side on the node and applied to the session cache.
        ``location_delta`` carries full location schemas discovered at this node.
        ``object_delta`` carries full object schemas introduced/found at this node.
        ``flag_schema_delta`` carries newly introduced flag schema entries declared
        at this node.
      example:
        metadata:
          themes:
          - themes
          - themes
          complexity: 0
          mood: mood
          age_rating: age_rating
          genre: genre
          drama_score: 6.027456183070403
        end_reason: end_reason
        flag_delta:
          key: ""
        object_delta:
          key:
            object_type: ""
            holder_id: ""
            name: name
            description: description
            location_id: ""
        resolved_anchor: resolved_anchor
        character_delta:
        - character_delta
        - character_delta
        node_type: node_type
        flag_schema_delta:
          key: ""
        history_summary: history_summary
        text: text
        choices:
        - flag_delta:
            key: ""
          flag_schema_delta:
            key: ""
          id: id
          label: label
          target_node_id: target_node_id
        - flag_delta:
            key: ""
          flag_schema_delta:
            key: ""
          id: id
          label: label
          target_node_id: target_node_id
        node_id: node_id
        location_delta:
          key:
            atmosphere: ""
            connected_to:
            - connected_to
            - connected_to
            name: name
            description: description
            region: ""
      properties:
        node_id:
          title: Node Id
          type: string
        text:
          title: Text
          type: string
        node_type:
          title: Node Type
          type: string
