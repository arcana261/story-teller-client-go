      - version
      title: HealthResponse
    JobStatusResponse:
      description: |-
        Response for GET /v1/authoring/jobs/{job_id}.

        One-shot JSON status check for an async story generation job.
        Clients that cannot consume SSE should poll this endpoint.

        ``status`` values:
        - ``queued``: job is in the ARQ queue but hasn't started.
        - ``in_progress``: worker is actively generating.
        - ``complete``: generation succeeded; ``story_id`` is populated.
        - ``failed``: generation failed; ``error`` contains a sanitised message.
        - ``not_found``: job_id is unknown or TTL has expired (> 5 min old).
      example:
        job_id: job_id
        story_id: story_id
        error: error
        status: status
      properties:
        job_id:
          title: Job Id
          type: string
        status:
          title: Status
          type: string
        story_id:
          nullable: true
          type: string
        error:
          nullable: true
          type: string
      required:
      - job_id
      - status
      title: JobStatusResponse
