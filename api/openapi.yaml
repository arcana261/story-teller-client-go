  /v1/authoring/stories:
    get:
      description: |-
        Return a cursor-paginated list of non-deleted stories for the calling tenant.

        Richer than the player-facing ``GET /v1/stories`` — includes
        ``generation_contract``, ``flag_schema``, and ``characters`` so tenants
        can inspect how each story was configured at generation time.

        ``limit`` is capped at 100.
      operationId: list_stories_v1_authoring_stories_get
      parameters:
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          title: Limit
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_AuthoringStorySummaryResponse_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Stories
      tags:
      - authoring
    post:
      description: |-
        Generate a new story for the authenticated tenant.

        **Sync mode** (``mode="sync"``, default): generation runs in-process.
        The response is returned once the pipeline completes (may take 10–60 s
        depending on story size).  HTTP 201 with ``story_id`` populated.

        **Async mode** (``mode="async"``): the job is enqueued via ARQ.
        HTTP 202 is returned immediately with ``job_id``; call
        ``GET /v1/authoring/jobs/{job_id}`` or
        ``GET /v1/authoring/jobs/{job_id}/stream`` to track progress.

        ``tenant_id`` and ``story_id`` are assigned server-side — do not include
        them in the request body.
      operationId: generate_story_v1_authoring_stories_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoryGenerateRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryGenerateResponse"
          description: Sync generation complete — story_id is populated.
        "202":
          description: "Async job enqueued — poll /jobs/{job_id} for status."
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Generate Story
      tags:
      - authoring
  /v1/authoring/stories/{story_id}:
    delete:
      description: |-
        Soft-delete a story owned by the calling tenant.

        Sets ``deleted_at``; child rows (nodes, events, sessions) are retained.
        Idempotent: returns 204 whether or not the story existed.  Returns 422 if
        ``story_id`` is not a valid UUID.
      operationId: delete_story_v1_authoring_stories__story_id__delete
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Delete Story
      tags:
      - authoring
    get:
      description: |-
        Return the full story record for a single story owned by the calling tenant.

        Equivalent to ``GET /v1/admin/story/{story_id}`` but authenticated by
        tenant API key rather than admin bearer token.  Includes
        ``generation_contract``, ``flag_schema``, ``initial_world_flags``, and
        the full ``characters`` registry.

        Returns 404 when the story does not exist or belongs to a different tenant.
      operationId: get_story_v1_authoring_stories__story_id__get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryDetailResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Story
      tags:
      - authoring
  /v1/authoring/stories/{story_id}/graph:
    get:
      description: Return the full story DAG for the calling tenant.
      operationId: get_story_graph_v1_authoring_stories__story_id__graph_get
      parameters:
