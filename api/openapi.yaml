        Only the ``essential`` flag can be updated via the authoring surface.
        Setting ``essential=True`` instructs the context builder to always include
        this node's ``formalized_text`` in the synthesized narrative entry regardless
        of byte budget.  All other fields are immutable after creation.
      example:
        essential: true
      properties:
        essential:
          nullable: true
          type: boolean
      title: PatchExplorationNodeRequest
    PathsResponse:
      description: |-
        All start-to-end paths through the story DAG.

        Each path is an ordered list of ``node_id`` strings from ``start_node_id``
        to an END node.  Used by ``GET /story/{id}/paths``.
      example:
        paths:
        - - paths
          - paths
        - - paths
          - paths
        story_id: story_id
      properties:
        story_id:
          title: Story Id
          type: string
        paths:
          items:
            items:
              type: string
            type: array
          title: Paths
          type: array
      required:
      - paths
      - story_id
      title: PathsResponse
    PlayerDataExportResponse:
      description: |-
        Portable player data export for the authenticated tenant/player.

        The payload is a JSON object with stable top-level groups rather than a
        single flattened event log. That keeps future player-owned domains additive
        without changing how clients find exploration rows.
      example:
        tenant_id: tenant_id
        entity_provenance:
        - tenant_id: tenant_id
          playthrough_id: playthrough_id
          last_updated_at_node_id: last_updated_at_node_id
          introduced_at_node_id: introduced_at_node_id
          story_id: story_id
          introduced_at_choice_id: introduced_at_choice_id
          session_id: session_id
          entity_id: entity_id
          entity_type: entity_type
          last_updated_at: 2000-01-23T04:56:07.000+00:00
          id: id
          last_updated_at_choice_id: last_updated_at_choice_id
          introduced_at: 2000-01-23T04:56:07.000+00:00
        - tenant_id: tenant_id
          playthrough_id: playthrough_id
          last_updated_at_node_id: last_updated_at_node_id
          introduced_at_node_id: introduced_at_node_id
          story_id: story_id
          introduced_at_choice_id: introduced_at_choice_id
          session_id: session_id
          entity_id: entity_id
          entity_type: entity_type
          last_updated_at: 2000-01-23T04:56:07.000+00:00
          id: id
          last_updated_at_choice_id: last_updated_at_choice_id
          introduced_at: 2000-01-23T04:56:07.000+00:00
        sessions:
        - key: ""
        - key: ""
        player_id: player_id
        exploration:
          node_exploration_turns:
          - key: ""
          - key: ""
        generated_at: generated_at
      properties:
        tenant_id:
          title: Tenant Id
          type: string
        player_id:
          title: Player Id
          type: string
        generated_at:
          title: Generated At
          type: string
        sessions:
          default: []
          items:
            additionalProperties: true
            nullable: true
            type: object
          title: Sessions
          type: array
        exploration:
          $ref: "#/components/schemas/PlayerExplorationDataExport"
        entity_provenance:
          default: []
          items:
            $ref: "#/components/schemas/EntityProvenanceExportEntryResponse"
          title: Entity Provenance
          type: array
      required:
      - exploration
      - generated_at
      - player_id
      - tenant_id
      title: PlayerDataExportResponse
    PlayerErasureResponse:
      description: |-
        Counts returned after player-owned data erasure completes.

        Counts are useful for audit and support workflows while avoiding any
        post-erasure echo of raw content.
      example:
        tenant_id: tenant_id
        player_id: player_id
        deleted:
          key: 0
      properties:
        tenant_id:
          title: Tenant Id
          type: string
        player_id:
          title: Player Id
          type: string
        deleted:
          additionalProperties:
            type: integer
          title: Deleted
      required:
      - deleted
      - player_id
      - tenant_id
      title: PlayerErasureResponse
    PlayerExplorationDataExport:
      description: |-
        Exploration-specific player-owned rows included in a data export.

        Unlike ``ExplorationStateResponse``, this portability schema intentionally
        includes raw turn rows because questions, answers, detail deltas, and
        response snapshots are player-owned content. Normal reload/state reads stay
        redacted; export is the explicit privacy-reviewed readback path.

        Node enrichment is now shared/canonical and is not player-attributed, so
        only exploration turns (the player-owned transcript) are exported here.
      example:
        node_exploration_turns:
        - key: ""
        - key: ""
      properties:
        node_exploration_turns:
          default: []
          items:
            additionalProperties: true
            nullable: true
            type: object
          title: Node Exploration Turns
          type: array
      title: PlayerExplorationDataExport
    RotateAnthropicKeyRequest:
      description: |-
        Request body for PUT /admin/tenants/{id}/anthropic-key.

        Replaces the encrypted Anthropic API key stored for a tenant without
        changing any other tenant attributes.
      example:
        anthropic_api_key: anthropic_api_key
      properties:
        anthropic_api_key:
          minLength: 1
          title: Anthropic Api Key
          type: string
      required:
      - anthropic_api_key
      title: RotateAnthropicKeyRequest
    SessionResponse:
      description: |-
        Player session state returned by session-creation and choice-submission endpoints.

        ``playthrough_id`` identifies the current run within a stable ``session_id``.
        It changes after reset and gives clients a cheap way to discard stale local
        caches or in-flight request bookkeeping from the previous run.

        ``lock_token`` is a UUID issued when a free-text request starts processing.
        The client must include it in concurrent requests to avoid races; it is
        ``None`` when no lock is currently held.

        ``is_completed`` becomes ``True`` when the player reaches an END node and
        the story does not allow free-text continuation.
      example:
        world_flags:
          key: ""
        playthrough_id: playthrough_id
        discovered_objects:
          key:
            object_type: ""
            holder_id: ""
            name: name
            description: description
            location_id: ""
        discovered_flag_schema:
          key: ""
        discovered_locations:
          key:
            atmosphere: ""
            connected_to:
            - connected_to
            - connected_to
            name: name
            description: description
            region: ""
        session_id: session_id
        warnings_acknowledged_at: warnings_acknowledged_at
        current_node_id: current_node_id
        is_completed: true
        nodes_visited: 0
        lock_token: lock_token
      properties:
        session_id:
          title: Session Id
          type: string
        playthrough_id:
          title: Playthrough Id
          type: string
        current_node_id:
          title: Current Node Id
          type: string
        world_flags:
          additionalProperties: true
          title: World Flags
          type: object
        discovered_locations:
          additionalProperties:
            $ref: "#/components/schemas/LocationSpecResponse"
          default: {}
          title: Discovered Locations
        discovered_objects:
          additionalProperties:
            $ref: "#/components/schemas/ObjectSpecResponse"
          default: {}
          title: Discovered Objects
        discovered_flag_schema:
          additionalProperties: true
          default: {}
          title: Discovered Flag Schema
          type: object
        nodes_visited:
          title: Nodes Visited
          type: integer
        is_completed:
          title: Is Completed
          type: boolean
        lock_token:
          nullable: true
          type: string
        warnings_acknowledged_at:
          nullable: true
          type: string
      required:
      - current_node_id
      - is_completed
      - nodes_visited
      - playthrough_id
      - session_id
      - world_flags
      title: SessionResponse
    StoryDetailResponse:
      description: |-
        Detailed story response for admin and authoring endpoints.

        Includes the declarative state persistence fields: character registry,
