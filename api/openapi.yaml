      description: |-
        Response body for GET /health.

        ``status`` is the aggregate health: ``"ok"`` when all required services
        are reachable, ``"degraded"`` when some optional services are down,
        ``"unavailable"`` when a required service (Postgres or Redis) is unreachable.
      example:
        version: version
