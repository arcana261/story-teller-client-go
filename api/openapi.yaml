          type: string
        max_age_rating:
          default: teen
          title: Max Age Rating
          type: string
      required:
      - anthropic_api_key
      - billing_country
      - contact_email
      - name
      title: TenantRegistrationRequest
    TenantRegistrationResponse:
      description: |-
        Response body for POST /admin/tenants.

        ``api_key`` is the full unmasked key shown exactly once at registration
        time — it is not stored and cannot be retrieved later.  Subsequent
        API calls authenticate using the key's SHA-256 hash prefix.
      example:
