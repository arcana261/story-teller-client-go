    StoryGenerateRequest:
      description: |-
        Request body for POST /v1/authoring/stories.

        Mirrors ``GenerationContract`` fields exposed to tenants; ``tenant_id``
        and ``story_id`` are assigned server-side and must not appear here.

        ``mode`` selects the execution model:
        - ``"sync"`` (default): generation runs in-process; ``story_id`` is
          returned in the 201 response body when generation succeeds.
        - ``"async"``: the job is enqueued via ARQ; the response carries only
          ``job_id`` (HTTP 202). The caller polls
          ``GET /v1/authoring/jobs/{job_id}`` or streams
          ``GET /v1/authoring/jobs/{job_id}/stream`` for completion.

        ``outcome_anchors`` is an optional list of 2–4 short strings describing
        valid ending shapes that the LLM should steer the narrative toward.
      example:
        complexity: 3
        world_system_prompt: world_system_prompt
        age_rating: age_rating
        target_node_count: 5
        flag_schema:
          key: ""
        objects:
          key: ""
        allow_free_text_continuation: true
        allow_llm_characters: true
        mode: sync
        themes:
        - themes
        - themes
        characters:
          key: ""
        history_context_window: 12
        initial_world_flags:
          key: ""
        outcome_anchors:
        - outcome_anchors
        - outcome_anchors
        genre: genre
        allow_llm_objects: true
        locations:
          key: ""
        allow_llm_locations: true
        unbounded: false
        history_summary_max_chars: 115
        prompt: prompt
      properties:
        prompt:
          minLength: 1
          title: Prompt
          type: string
        mode:
          default: sync
          pattern: ^(sync|async)$
          title: Mode
          type: string
        genre:
          nullable: true
          type: string
        themes:
          items:
            type: string
          nullable: true
          type: array
        target_node_count:
          maximum: 30.0
          minimum: 3.0
          nullable: true
          type: integer
        age_rating:
          nullable: true
          type: string
        complexity:
          maximum: 5.0
          minimum: 1.0
          nullable: true
          type: integer
        initial_world_flags:
          additionalProperties: true
          nullable: true
          type: object
        flag_schema:
          additionalProperties: true
          nullable: true
          type: object
        characters:
          additionalProperties: true
          nullable: true
          type: object
        locations:
          additionalProperties: true
          nullable: true
          type: object
        objects:
          additionalProperties: true
          nullable: true
          type: object
        allow_free_text_continuation:
          default: true
          title: Allow Free Text Continuation
          type: boolean
        unbounded:
          default: false
          title: Unbounded
          type: boolean
        allow_llm_characters:
          default: true
          title: Allow Llm Characters
          type: boolean
        allow_llm_locations:
          default: true
          title: Allow Llm Locations
          type: boolean
        allow_llm_objects:
          default: true
          title: Allow Llm Objects
          type: boolean
        outcome_anchors:
          items:
            type: string
          nullable: true
          type: array
        history_summary_max_chars:
          maximum: 500.0
          minimum: 50.0
          nullable: true
          type: integer
        history_context_window:
          maximum: 20.0
          minimum: 1.0
          nullable: true
          type: integer
        world_system_prompt:
          nullable: true
          type: string
      required:
      - prompt
      title: StoryGenerateRequest
    StoryGenerateResponse:
      description: |-
        Response for POST /v1/authoring/stories.

        HTTP 201 is returned on ``mode="sync"`` success; HTTP 202 for
        ``mode="async"`` (job enqueued).

        On the sync path ``story_id`` is populated immediately and
        ``status="complete"``.  On the async path ``story_id`` is ``None`` and
        ``status="queued"``.
      example:
        mode: mode
        job_id: job_id
        story_id: story_id
        status: status
      properties:
        job_id:
          title: Job Id
          type: string
        mode:
          title: Mode
          type: string
        story_id:
          nullable: true
          type: string
        status:
          title: Status
          type: string
      required:
      - job_id
      - mode
      - status
      - story_id
      title: StoryGenerateResponse
    StorySummaryResponse:
      description: |-
        Lightweight story summary for the list-stories endpoint.

        ``unbounded`` indicates that the depth cap is disabled for this story —
        the player can continue indefinitely past ``max_nodes`` via free-text.
      example:
        content_warnings:
        - content_warnings
        - content_warnings
        story_id: story_id
        genre: genre
        max_nodes: 0
        start_node_id: start_node_id
        title: title
        unbounded: false
      properties:
        story_id:
          title: Story Id
          type: string
        title:
          title: Title
          type: string
        start_node_id:
          title: Start Node Id
          type: string
        genre:
          nullable: true
          type: string
        content_warnings:
          items:
            type: string
          nullable: true
          type: array
        max_nodes:
          default: 10
          title: Max Nodes
          type: integer
        unbounded:
          default: false
          title: Unbounded
          type: boolean
      required:
      - start_node_id
      - story_id
      - title
      title: StorySummaryResponse
    TenantRegistrationRequest:
      description: |-
        Request body for POST /admin/tenants (create a new API tenant).

        ``anthropic_api_key`` is encrypted at rest using the platform Fernet key
        and stored in ``TenantORM.anthropic_api_key_enc`` — the raw value is never
        persisted.  ``billing_country`` must be a 2-letter ISO 3166-1 alpha-2 code.
      example:
        anthropic_api_key: anthropic_api_key
        name: name
        billing_country: billing_country
        max_age_rating: teen
        contact_email: contact_email
      properties:
        name:
          minLength: 1
