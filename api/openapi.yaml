        start_node_id:
          title: Start Node Id
          type: string
        genre:
          nullable: true
          type: string
        content_warnings:
          items:
            type: string
          nullable: true
          type: array
        max_nodes:
          default: 10
          title: Max Nodes
          type: integer
        unbounded:
          default: false
          title: Unbounded
          type: boolean
        flag_schema:
          additionalProperties: true
          default: {}
          title: Flag Schema
          type: object
        initial_world_flags:
          additionalProperties: true
          default: {}
          title: Initial World Flags
          type: object
        characters:
          additionalProperties:
            $ref: "#/components/schemas/CharacterSpecResponse"
          default: {}
          title: Characters
        locations:
          additionalProperties:
            $ref: "#/components/schemas/LocationSpecResponse"
          default: {}
          title: Locations
        objects:
