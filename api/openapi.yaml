  /v1/authoring/jobs/{job_id}:
    get:
      description: |-
        Return the current status of an async story generation job.

        One-shot JSON alternative to the SSE stream endpoint.  Useful for clients
        that cannot consume Server-Sent Events.

        ``status`` values:
        - ``queued``: job is in the ARQ queue but hasn't started.
        - ``in_progress``: worker is actively processing.
        - ``complete``: generation succeeded; ``story_id`` is populated.
        - ``failed``: generation failed; ``error`` contains a sanitised message.
        - ``not_found``: job_id unknown or TTL expired (> 5 min after completion).
      operationId: get_job_status_v1_authoring_jobs__job_id__get
      parameters:
      - explode: false
        in: path
        name: job_id
        required: true
        schema:
          title: Job Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Job Status
      tags:
      - authoring
  /v1/authoring/jobs/{job_id}/stream:
    get:
      description: |-
        SSE stream that pushes ARQ job lifecycle events until completion.

        Polls ``arq:result:{job_id}`` and ``arq:in-progress:{job_id}`` at 250 ms
        intervals.  Emits ``queued``, ``in_progress``, ``complete``, ``failed``,
        and ``heartbeat`` events.  Closes after a terminal event or 5-minute
        timeout.

        Equivalent to the smoketest ``GET /smoketest/job/{job_id}/status`` but
        tenant-authenticated and visible in the OpenAPI schema.
      operationId: stream_job_status_v1_authoring_jobs__job_id__stream_get
      parameters:
      - explode: false
        in: path
        name: job_id
        required: true
        schema:
          title: Job Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Stream Job Status
      tags:
      - authoring
  /v1/authoring/stories/{story_id}/exploration-nodes:
    get:
      description: |-
        List exploration nodes for a story with optional filtering and cursor pagination.

        ``parent_node_id`` filters to nodes anchored at a specific DAG node.
        ``essential`` filters to only essential or non-essential nodes (applied in-memory
        after the repository fetch since the underlying method returns a plain list).
        ``cursor`` is the ``id`` of the last item from the previous page — used for
        simple in-memory slice pagination.  Cursor-based approach is acceptable here
        because the total count per story is bounded and authoring calls are low-volume.
      operationId: list_authoring_exploration_nodes_v1_authoring_stories__story_id__exploration_nodes_get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: true
        in: query
        name: parent_node_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: essential
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          title: Limit
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_ExplorationNodeResponse_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Authoring Exploration Nodes
      tags:
      - authoring
  /v1/authoring/stories/{story_id}/exploration-nodes/{node_id}:
    get:
      description: |-
        Fetch a single exploration node by ID.

        Returns 404 if the node does not exist or belongs to a different tenant/story.
        ``picked`` is always ``False`` — authoring routes have no session context.
      operationId: get_authoring_exploration_node_v1_authoring_stories__story_id__exploration_nodes__node_id__get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: false
        in: path
        name: node_id
        required: true
        schema:
          title: Node Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplorationNodeResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Authoring Exploration Node
      tags:
      - authoring
    patch:
      description: |-
        Update the ``essential`` flag on an exploration node.

        Only the ``essential`` flag is mutable via the authoring surface.  When
        ``essential=True``, the node's ``formalized_text`` is always included in the
        synthesized narrative context entry regardless of byte budget.  This lets
        authors guarantee that critical discoveries (e.g. "The murderer was seen near
        the west wing at midnight") are never omitted during generation.

        This operation is idempotent: setting ``essential=True`` on an already-essential
        node returns the node unchanged.  Omitting ``essential`` from the request body
        is also a no-op — the node is fetched and returned as-is.

        Returns 404 if the node does not exist or belongs to a different tenant/story.
        Returns 409 if ``essential=True`` is requested but the parent story node already
        has materialized child nodes — marking essential after generation would make the
        essential context invisible to already-generated downstream text.
        ``picked`` is always ``False`` — authoring routes have no session context.
      operationId: patch_authoring_exploration_node_v1_authoring_stories__story_id__exploration_nodes__node_id__patch
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: false
        in: path
        name: node_id
        required: true
        schema:
          title: Node Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchExplorationNodeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplorationNodeResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Patch Authoring Exploration Node
      tags:
      - authoring
components:
  schemas:
    AcceptToSRequest:
      description: |-
        Request body for POST /tos/accept (player accepts the current ToS).

        ``tos_version_id`` must be the UUID of the ToS version the player is
        accepting — validated client-side to prevent stale-version acceptance.
      example:
        tos_version_id: tos_version_id
      properties:
        tos_version_id:
          minLength: 32
          title: Tos Version Id
          type: string
      required:
      - tos_version_id
      title: AcceptToSRequest
    ArcAnalysis:
      description: Arc analysis result for a story node at a given graph depth.
      example:
        phase: phase
        tension_label: tension_label
        depth: 6
        choices_reordered: true
        ideal_tension: 5.637376656633329
        max_nodes: 1
        progress: 5.962133916683182
        deviation: 2.3021358869347655
        unbounded: false
        drama_score: 0.8008281904610115
        on_track: true
      properties:
        drama_score:
          title: Drama Score
          type: number
        tension_label:
          title: Tension Label
          type: string
        depth:
          title: Depth
          type: integer
        max_nodes:
          title: Max Nodes
          type: integer
        progress:
          title: Progress
          type: number
        phase:
          title: Phase
          type: string
        ideal_tension:
          title: Ideal Tension
          type: number
        deviation:
          title: Deviation
          type: number
        on_track:
          title: On Track
          type: boolean
        choices_reordered:
          title: Choices Reordered
          type: boolean
        unbounded:
          default: false
          title: Unbounded
          type: boolean
      required:
      - choices_reordered
      - depth
      - deviation
      - drama_score
      - ideal_tension
      - max_nodes
      - on_track
      - phase
      - progress
      - tension_label
      title: ArcAnalysis
    AuthoringStorySummaryResponse:
      description: |-
        Story summary item for GET /v1/authoring/stories.

        Richer than the player-facing ``StorySummaryResponse`` — includes
        ``generation_contract`` and authoring metadata so tenants can inspect
        how each story was originally generated.
      example:
        characters:
          key:
            backstory: ""
            voice: ""
            role: role
            traits:
            - traits
            - traits
            motive: motive
            name: name
        story_id: story_id
        flag_schema:
          key: ""
        objects:
          key:
            object_type: ""
            holder_id: ""
            name: name
            description: description
            location_id: ""
        genre: genre
        max_nodes: 0
        locations:
          key:
            atmosphere: ""
            connected_to:
            - connected_to
            - connected_to
            name: name
            description: description
            region: ""
        start_node_id: start_node_id
        generation_contract:
          key: ""
        title: title
        unbounded: false
      properties:
        story_id:
          title: Story Id
          type: string
        title:
          title: Title
          type: string
        start_node_id:
          title: Start Node Id
          type: string
        max_nodes:
          title: Max Nodes
          type: integer
        unbounded:
          default: false
          title: Unbounded
          type: boolean
        genre:
          nullable: true
          type: string
        flag_schema:
          additionalProperties: true
          default: {}
          title: Flag Schema
          type: object
        characters:
          additionalProperties:
            $ref: "#/components/schemas/CharacterSpecResponse"
          default: {}
          title: Characters
        locations:
          additionalProperties:
            $ref: "#/components/schemas/LocationSpecResponse"
          default: {}
          title: Locations
        objects:
          additionalProperties:
            $ref: "#/components/schemas/ObjectSpecResponse"
          default: {}
          title: Objects
        generation_contract:
          additionalProperties: true
          nullable: true
          type: object
      required:
      - max_nodes
      - start_node_id
      - story_id
      - title
      title: AuthoringStorySummaryResponse
    CharacterSpecResponse:
      description: Author-defined character with traits and motives.
      example:
        backstory: ""
        voice: ""
        role: role
        traits:
        - traits
        - traits
        motive: motive
        name: name
      properties:
        name:
          title: Name
          type: string
        role:
          title: Role
          type: string
        traits:
          items:
            type: string
          title: Traits
          type: array
        motive:
          title: Motive
          type: string
        backstory:
          default: ""
          title: Backstory
          type: string
        voice:
