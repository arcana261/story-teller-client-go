openapi: 3.1.0
info:
  title: Story Engine API
  version: 0.1.12
servers:
- url: /
security:
- PlayerApiKey: []
  PlayerId: []
paths:
  /v1/health:
    get:
      description: Return aggregate health status for Postgres and Redis.
      operationId: health_v1_health_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Successful Response
      summary: Health
      tags:
      - player
  /v1/stories:
    get:
      description: Return a cursor-paginated list of stories available to the authenticated
        tenant.
      operationId: list_stories_v1_stories_get
      parameters:
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          title: Limit
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse_StorySummaryResponse_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Stories
      tags:
      - player
  /v1/story/{story_id}/node/{node_id}:
    get:
      description: "Fetch a story node by ID, with optional drama scoring when a session\
        \ exists."
      operationId: get_node_v1_story__story_id__node__node_id__get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: false
        in: path
        name: node_id
        required: true
        schema:
          title: Node Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Node
      tags:
      - player
  /v1/story/{story_id}/node/{node_id}/arc:
    get:
      description: "Return arc analysis for a node, computing its depth server-side\
        \ via BFS."
      operationId: get_node_arc_v1_story__story_id__node__node_id__arc_get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: false
        in: path
        name: node_id
        required: true
        schema:
          title: Node Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArcAnalysis"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Node Arc
      tags:
      - player
  /v1/story/{story_id}/session:
    get:
      description: "Return the existing session for this player/story pair, creating\
        \ one lazily if absent."
      operationId: get_or_create_session_v1_story__story_id__session_get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Or Create Session
      tags:
      - player
  /v1/story/{story_id}/session/entity-index:
    get:
      description: Return the current playthrough's entity provenance index.
      operationId: get_entity_index_v1_story__story_id__session_entity_index_get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityIndexResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Entity Index
      tags:
      - player
  /v1/story/{story_id}/choice:
    post:
      description: |-
        Submit a player choice and advance the session.

        For **lazy choices** (``choice.target_node_id`` is null/empty) with
        ``Accept: text/event-stream``, generation runs in a background task and the
        response is a live SSE stream.  See the ``responses`` schema above for the
        full event sequence (``thinking`` → ``token``\* → ``done`` | ``error``).

        For all other cases the response is a standard JSON ``NodeResponse``.
      operationId: submit_choice_v1_story__story_id__choice_post
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChoiceRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeResponse"
            text/event-stream:
              example: |+
                event: thinking
                data: {}

                event: token
                data: {"word": "Once"}

                event: token
                data: {"word": "upon"}

                event: done
                data: {"node_id": "...", "text": "Once upon ..."}

              schema:
                nullable: true
                type: string
          description: |-
            Node response. Content type depends on Accept header and choice type.

            **application/json** — returned when the choice has a pre-authored `target_node_id`, or when the client does not send `Accept: text/event-stream`. Body is a `NodeResponse` object.

            **text/event-stream** — returned when the choice is lazy (no `target_node_id`) and the client sends `Accept: text/event-stream`. The stream emits the following SSE events in order:

            | Event | Data | Description |
            |-------|------|-------------|
            | `thinking` | `{}` | Emitted immediately; signals the pipeline has started. Use to show a loading state. |
            | `token` | `{"word": "<str>"}` | One word of generated text. Emitted for each word as the LLM streams. |
            | `done` | `NodeResponse` (full object) | Final node after session has been advanced. Always the last event on success. |
            | `error` | `{"error_code": "<str>", "message": "<str>"}` | Emitted when the pipeline fails. Always the last event on failure. |

            The stream always ends with either `done` or `error`, never both. A `done` event contains the complete `NodeResponse`; token events may be discarded if only the final node is needed.
        "409":
          description: IDEMPOTENCY_CONFLICT — duplicate request is being processed.
        "429":
          description: SESSION_BUSY — another LLM request is active for this session.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Submit Choice
      tags:
      - player
  /v1/story/{story_id}/explore:
    post:
      description: |-
        Answer a non-advancing scene exploration question.

        Returns a JSON ``ExplorationResponse`` by default.  When the client sends
        ``Accept: text/event-stream`` the response is a live SSE stream
        (``thinking`` → ``token``\* → ``done`` | ``error``).

        The important ordering is: exact replay, cheap validation/caps, quota
        charge, then the Stage 5 pipeline. That keeps stored replays reachable
        even when a player is over quota, while brand-new model work is charged
        before it can reach the LLM.
      operationId: explore_node_v1_story__story_id__explore_post
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplorationRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: |-
            Non-advancing exploration answer.

            **JSON** (default, or ``Accept: application/json``): Returns an ``ExplorationResponse`` object.

            **SSE** (``Accept: text/event-stream``): Returns a live token stream.

            | Event | Data | Description |
            |-------|------|-------------|
            | `thinking` | `{}` | Pipeline started. |
            | `token` | `{"word": "<str>"}` | One word of generated text. |
            | `done` | `ExplorationResponse` | Final answer. Always the last event on success. |
            | `error` | `{"error_code": "<str>", "message": "<str>"}` | Pipeline failure. Always the last event on failure. |

            The stream always ends with either ``done`` or ``error``, never both.
        "409":
          description: "STALE_SESSION, SESSION_LOCKED, or IDEMPOTENCY_CONFLICT."
        "413":
          description: EXPLORATION_OVERLAY_TOO_LARGE.
        "429":
          description: "Exploration rate, node-question, cache-miss, or session-busy\
            \ limit."
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Explore Node
      tags:
      - player
  /v1/story/{story_id}/exploration-state:
    get:
      description: Return current-node exploration state without raw turn transcript
        text.
      operationId: get_exploration_state_v1_story__story_id__exploration_state_get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: true
        in: query
        name: node_id
        required: true
        schema:
          title: Node Id
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplorationStateResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Exploration State
      tags:
      - player
  /v1/story/{story_id}/exploration-nodes:
    get:
      description: |-
        List all exploration nodes anchored at a given story node for the current session.

        Returns ``picked=True`` for any node this session/playthrough has already opted into.
        The ``answer`` field is included so players can read the full narrative text before
        deciding whether to pick a shared discovery from another player's run.
      operationId: list_player_exploration_nodes_v1_story__story_id__exploration_nodes_get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: true
        in: query
        name: parent_node_id
        required: true
        schema:
          title: Parent Node Id
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ExplorationNodeResponse"
                title: Response List Player Exploration Nodes V1 Story  Story Id  Exploration
                  Nodes Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Player Exploration Nodes
      tags:
      - player
  /v1/story/{story_id}/exploration-nodes/{node_id}/pick:
    delete:
      description: |-
        Remove the current session's pick for an exploration node.

        This operation is intentionally idempotent: if the pick does not exist
        (either it was never created or was already deleted), the response is still
        200 with ``picked=False``.  No 404 is returned because the desired end state
        (node is not picked) is already satisfied.  This matches the standard REST
        pattern for idempotent DELETE operations.
      operationId: unpick_exploration_node_v1_story__story_id__exploration_nodes__node_id__pick_delete
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: false
        in: path
        name: node_id
        required: true
        schema:
          title: Node Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplorationPickResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Unpick Exploration Node
      tags:
      - player
    post:
      description: |-
        Opt the current session into a pre-existing exploration node.

        The player is explicitly picking a shared discovery from another player's
        run — this is *not* an auto-generated pick from the player's own turn.
        Therefore ``auto_picked=False`` is passed to the repository so the pick is
        distinguishable from auto-picks created by Phase 3 of the exploration pipeline.

        A session-node guard prevents picks on nodes belonging to story positions the
        player has not yet reached (or has already left).  This avoids contaminating
        the narrative context with discoveries that were not relevant at the current node.
      operationId: pick_exploration_node_v1_story__story_id__exploration_nodes__node_id__pick_post
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: false
        in: path
        name: node_id
        required: true
        schema:
          title: Node Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplorationPickResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Pick Exploration Node
      tags:
      - player
  /v1/story/{story_id}/free-text:
    post:
      description: |-
        Submit a free-text player input and advance the session.

        Always returns a live SSE stream (``text/event-stream``).  See the
        ``responses`` schema above for the full event sequence
        (``thinking`` → ``token``\* → ``done`` | ``error``).
      operationId: submit_free_text_v1_story__story_id__free_text_post
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeTextRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
            text/event-stream:
              example: |+
                event: thinking
                data: {}

                event: token
                data: {"word": "Once"}

                event: done
                data: {"node_id": "...", "text": "Once upon ..."}

              schema:
                nullable: true
                type: string
          description: |-
            Node response as an SSE stream. Always returns ``text/event-stream``.

            | Event | Data | Description |
            |-------|------|-------------|
            | `thinking` | `{}` | Emitted immediately; signals the pipeline has started. |
            | `token` | `{"word": "<str>"}` | One word of generated text. |
            | `done` | `NodeResponse` (full object) | Final node. Always the last event on success. |
            | `error` | `{"error_code": "<str>", "message": "<str>"}` | Pipeline failure. Always the last event on failure. |

            The stream always ends with either ``done`` or ``error``, never both.
        "409":
          description: IDEMPOTENCY_CONFLICT — duplicate request is being processed.
        "429":
          description: SESSION_BUSY — another LLM request is active for this session.
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Submit Free Text
      tags:
      - player
  /v1/story/{story_id}/session/reset:
    post:
      description: |-
        Reset a completed session back to the start node.

        By default only completed sessions can be reset; pass ``?force=true`` to
        reset an active session (useful for testing and tooling).  The distributed
        lock is also cleared so any stale in-flight request cannot advance the
        newly-reset session.
      operationId: reset_session_v1_story__story_id__session_reset_post
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: true
        in: query
        name: force
        required: false
        schema:
          default: false
          title: Force
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Reset Session
      tags:
      - player
  /v1/terms:
    get:
      description: "Return the current (latest effective) Terms of Service version,\
        \ or null if none published."
      operationId: get_current_tos_v1_terms_get
      responses:
        "200":
          content:
            application/json:
              schema:
                allOf:
                - $ref: "#/components/schemas/ToSVersionResponse"
                nullable: true
          description: Successful Response
      summary: Get Current Tos
      tags:
      - player
  /v1/terms/accept:
    post:
      description: Record that the authenticated player has accepted the specified
        ToS version.
      operationId: accept_tos_v1_terms_accept_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptToSRequest"
        required: true
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Accept Tos
      tags:
      - player
  /v1/player/{player_id}/tos-status:
    get:
      description: Return whether the requesting player has accepted the current ToS
        version.
      operationId: get_tos_status_v1_player__player_id__tos_status_get
      parameters:
      - explode: false
        in: path
        name: player_id
        required: true
        schema:
          title: Player Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToSStatusResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Tos Status
      tags:
      - player
  /v1/player/{player_id}/data-export:
    get:
      description: |-
        Return player-owned session and exploration data for portability.

        The no-ToS auth dependency is intentional: portability and erasure rights
        should not be blocked by a player declining or not yet accepting a newer
        Terms of Service version. The route still verifies that the authenticated
        ``X-Player-Id`` exactly matches the path parameter.
      operationId: export_player_data_v1_player__player_id__data_export_get
      parameters:
      - explode: false
        in: path
        name: player_id
        required: true
        schema:
          title: Player Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDataExportResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Export Player Data
      tags:
      - player
  /v1/player/{player_id}:
    delete:
      description: |-
        Delete player-owned session and exploration data for erasure.

        Exploration has no current legal-hold exception in this codebase, so the
        repository hard-deletes the raw transcript rows and overlays. The count
        response is deliberately narrow operational metadata, not a copy of any
        deleted content.
      operationId: erase_player_data_v1_player__player_id__delete
      parameters:
      - explode: false
        in: path
        name: player_id
        required: true
        schema:
          title: Player Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerErasureResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Erase Player Data
      tags:
      - player
  /v1/story/{story_id}/session/lock:
    delete:
      description: Release the session lock identified by the ``X-Session-Lock-Token``
        header.
      operationId: release_session_lock_v1_story__story_id__session_lock_delete
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      - explode: false
        in: header
        name: X-Session-Lock-Token
        required: true
        schema:
          title: X-Session-Lock-Token
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Release Session Lock
      tags:
      - player
  /v1/player/{player_id}/story/{story_id}/warnings/acknowledge:
    post:
      description: Record that the player has acknowledged content warnings for an
        adult-rated story.
      operationId: acknowledge_warnings_v1_player__player_id__story__story_id__warnings_acknowledge_post
      parameters:
      - explode: false
        in: path
        name: player_id
        required: true
        schema:
          title: Player Id
          type: string
        style: simple
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Acknowledge Warnings
      tags:
      - player
  /v1/story/{story_id}/graph:
    get:
      description: Return the full DAG structure of a story in development only.
      operationId: get_graph_topology_v1_story__story_id__graph_get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphTopologyResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Graph Topology
      tags:
      - player
  /v1/story/{story_id}/paths:
    get:
      description: Enumerate all start-to-end paths through the story DAG in development
        only.
      operationId: get_story_paths_v1_story__story_id__paths_get
      parameters:
      - explode: false
        in: path
        name: story_id
        required: true
        schema:
          title: Story Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathsResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Story Paths
      tags:
      - player
  /v1/admin/tenant/register:
    post:
      operationId: register_tenant_v1_admin_tenant_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantRegistrationRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantRegistrationResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      security:
      - AdminBearer: []
      summary: Register Tenant
      tags:
      - admin
  /v1/admin/tenant/{tenant_id}:
    delete:
      operationId: offboard_tenant_v1_admin_tenant__tenant_id__delete
      parameters:
      - explode: false
        in: path
        name: tenant_id
        required: true
