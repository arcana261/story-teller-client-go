    ExplorationNodeResponse:
      description: |-
        Single exploration Q&A discovery node returned by exploration-node list/get routes.

        Used by both player routes (where ``picked`` reflects the session/playthrough
        pick state) and authoring routes (where ``picked`` is always ``False`` because
        there is no session context in the authoring layer).
      example:
        question: question
        answer: answer
        picked: true
        detail_delta:
          key: ""
        id: id
        parent_node_id: parent_node_id
        formalized_text: formalized_text
        essential: true
      properties:
        id:
          title: Id
          type: string
        parent_node_id:
          title: Parent Node Id
          type: string
        question:
          title: Question
          type: string
        answer:
          title: Answer
          type: string
        formalized_text:
          title: Formalized Text
          type: string
        essential:
          title: Essential
          type: boolean
        picked:
          title: Picked
          type: boolean
        detail_delta:
          additionalProperties: true
          default: {}
          title: Detail Delta
          type: object
      required:
      - answer
      - essential
      - formalized_text
      - id
      - parent_node_id
      - picked
      - question
      title: ExplorationNodeResponse
    ExplorationPickResponse:
      description: |-
        Response returned by POST/DELETE /exploration-nodes/{id}/pick.

        Reflects the pick state AFTER the operation has been applied.
        ``picked=True`` after a POST (player opted in); ``picked=False`` after a
        DELETE (player opted out or was never opted in — idempotent).
      example:
        picked: true
        exploration_node_id: exploration_node_id
      properties:
        exploration_node_id:
          title: Exploration Node Id
          type: string
        picked:
          title: Picked
          type: boolean
      required:
      - exploration_node_id
      - picked
      title: ExplorationPickResponse
