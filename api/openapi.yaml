  /v1/admin/story/{story_id}/node/{node_id}/clear-enrichment:
    post:
      description: |-
        Clear a node's enrichment baseline and purge its cache.

        Replaces the old rollback-to-version endpoint. With ExplorationNode the
        only meaningful reset target is "no enrichment at all"; the new operation:
          - resets enrichment_details and enrichment_summary on the story_nodes row
          - hard-deletes exploration_cache rows so the cleared state is immediately
            observable to new exploration requests
          - bumps the node version so stale in-flight cache reads self-invalidate
          - emits NODE_ENRICHMENT_CLEARED for the audit trail

        Returns 404 if the node does not exist under the provided tenant.
      operationId: clear_node_enrichment_v1_admin_story__story_id__node__node_id__clear_enrichment_post
